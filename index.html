<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapsworth</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Helvetica Neue', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
        }
        .icon { width: 120px; height: 120px; border-radius: 24px; margin-bottom: 24px; }
        h1 { font-size: 2.4rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .tagline { font-size: 1.1rem; color: #999; margin-bottom: 40px; }
        .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .links a {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 12px;
            background: #2a2a4a;
            color: #c0c0ff;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        .links a:hover { background: #3a3a6a; }
        footer { margin-top: 60px; font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tapsworth</h1>
        <p class="tagline">Mechanical keyboard sounds for every keystroke</p>
        <div class="links">
            <a href="https://github.com/ChathushkaRodrigo/tapsworth-privacy/blob/main/Privacy.md">Privacy Policy</a>
            <a href="https://github.com/ChathushkaRodrigo/tapsworth-privacy/blob/main/Support.md">Support</a>
        </div>
        <footer>&copy; 2026 Chathushka Rodrigo. All rights reserved.</footer>
    </div>
</body>
</html>
